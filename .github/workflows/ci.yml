name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Determine semantic version from commit messages
  # ─────────────────────────────────────────────────────────────────────────
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      version_tag: ${{ steps.semver.outputs.version_tag }}
      is_tagged: ${{ steps.semver.outputs.is_tagged }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "#major"
          minor_pattern: "#minor"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false
          search_commit_body: true

  # ─────────────────────────────────────────────────────────────────────────
  # Build & test on multiple OS / Python version combinations
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build & test (${{ matrix.os }} / py${{ matrix.python-version }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-22.04
          - macos-latest
          - windows-latest
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project and dependencies
        run: uv sync --all-extras

      - name: Run linting (ruff)
        run: uv run ruff check src/ tests/

      - name: Run formatting check (black)
        run: uv run black --check src/ tests/

      - name: Run type checking (mypy)
        run: uv run mypy src/

      - name: Run tests
        run: uv run pytest tests/ -v --cov=moles_tools --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────────────────────────────────────
  # Build distribution packages (wheel + sdist)
  # ─────────────────────────────────────────────────────────────────────────
  package:
    name: Build distribution packages
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Stamp version
        run: |
          sed -i 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' pyproject.toml

      - name: Build wheel and sdist
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─────────────────────────────────────────────────────────────────────────
  # Publish to PyPI — only when pushing to main
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [version, package]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1

  # ─────────────────────────────────────────────────────────────────────────
  # Create a Git tag for the release version when pushing to main
  # ─────────────────────────────────────────────────────────────────────────
  tag-release:
    name: Tag release
    needs: [version, publish]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ needs.version.outputs.version_tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
